---

# Install required dependency
- name: Install dependency untuk MariaDB repository
  apt:
    name:
      - apt-transport-https
      - curl
      - gnupg
      - software-properties-common
    state: present

# Download mariadb signing key
- name: Download MariaDB signing key
  get_url:
    url: "{{ mariadb_key_url }}"
    dest: "{{ mariadb_key_path }}"
    mode: '0644'

# Add repository mariadb with singing key
- name: Tambah MariaDB repository V.{{ mariadb_version }} menggunakan Mirror link
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/mariadb-keyring.pgp] http://mirror.23media.com/mariadb/repo/{{ mariadb_version }}/ubuntu {{ ansible_distribution_release }} main"
    state: present
    filename: mariadb
    update_cache: yes

# Install mariadb server and client
- name: Install MariaDB Server
  apt:
    name:
      - mariadb-server
      - mariadb-client
    state: present

# Cek is service mariadb can running normaly
- name: Cek service MariaDB
  service:
    name: mariadb
    state: started
    enabled: yes
